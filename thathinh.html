<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 8/3 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }

body {
  min-height: 100%;
  background: #c2185b;
  background-image: linear-gradient(160deg, #7b0020 0%, #c2185b 28%, #e91e8c 58%, #f06292 82%, #ff80ab 100%);
  background-attachment: fixed;
  background-size: cover;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  color: white;
  overflow-x: hidden;
  font-family: 'Nunito', sans-serif;
  padding: 32px 20px 100px;
}

/* ===== FLOATING HEARTS BG ===== */
.hearts-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.hf {
  position: absolute; bottom: -60px; opacity: 0;
  font-size: var(--sz); line-height: 1; user-select: none;
  animation: floatUp var(--dur) linear var(--del) infinite;
}
@keyframes floatUp {
  0%   { bottom:-60px; opacity:0; transform:translateX(0) rotate(0deg) scale(1); }
  8%   { opacity:.85; } 85% { opacity:.4; }
  100% { bottom:110vh; opacity:0; transform:translateX(var(--dx)) rotate(var(--rot)) scale(var(--sc)); }
}

/* ===== HEADER ===== */
.header { position:relative; z-index:5; text-align:center; margin-bottom:20px; }
h1 {
  font-family: 'Dancing Script', cursive;
  font-size: 50px; font-weight: 700; letter-spacing: 3px;
  text-shadow: 0 3px 18px rgba(0,0,0,.4), 0 0 40px rgba(255,255,255,.4);
  margin-bottom: 8px;
}
#typing { font-size:19px; font-weight:700; text-shadow:0 2px 10px rgba(0,0,0,.4); min-height:28px; }
#typing::after { content:'|'; animation:blink .65s step-end infinite; }
@keyframes blink { 50%{opacity:0;} }

/* ===== HEART BOX ===== */
.heart-box {
  position: relative; width: 620px; height: 610px;
  z-index: 2; flex-shrink: 0;
}

/* ===== BORDER PHOTOS ===== */
.photo {
  position: absolute; width:65px; height:65px;
  object-fit: cover; border-radius: 10px;
  border: 3px solid rgba(255,255,255,.92);
  box-shadow: 0 4px 16px rgba(0,0,0,.5);
  transition: transform .3s, box-shadow .3s;
  animation: pFloat 4s ease-in-out infinite;
}
.photo:hover { transform:scale(1.35) rotate(4deg) !important; z-index:30; box-shadow:0 12px 30px rgba(0,0,0,.7); }
@keyframes pFloat { 0%,100%{translate:0 0;} 50%{translate:0 -7px;} }

/* ===== CENTER SLIDER ===== */
.center {
  position: absolute; left:195px; top:172px;
  width:230px; height:230px; border-radius:16px;
  overflow: hidden;
  box-shadow: 0 0 0 5px rgba(255,255,255,.75), 0 20px 60px rgba(0,0,0,.65);
  z-index: 10;
}
.slider-track {
  display: flex; height: 100%;
  transition: transform .8s cubic-bezier(.77,0,.18,1);
}
.slide { min-width:230px; height:230px; flex-shrink:0; }
.slide img { width:100%; height:100%; object-fit:cover; }
.slide-dots {
  position: absolute; bottom:-28px; left:50%; transform:translateX(-50%);
  display:flex; gap:7px;
}
.dot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,.35); border:2px solid white;
  cursor:pointer; transition:background .3s,transform .3s;
}
.dot.active { background:white; transform:scale(1.4); }

/* ===== SHARED BUTTON STYLE ===== */
.cta-btn, .secret-btn {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  border: none; border-radius: 50px;
  background: linear-gradient(135deg, #ff1744, #ff5c8a);
  color: white; cursor: pointer;
  box-shadow: 0 0 30px rgba(255,23,68,.7), 0 8px 22px rgba(0,0,0,.3);
  transition: transform .2s, box-shadow .2s;
}
.cta-btn:hover, .secret-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 50px rgba(255,23,68,1), 0 10px 28px rgba(0,0,0,.35);
}
.cta-btn { position:relative; z-index:5; margin-top:44px; padding:18px 52px; font-size:20px; }

/* ===== SECRET CORNER BUTTONS ===== */
.secret-btn {
  position: fixed; bottom:28px;
  padding: 15px 32px; font-size:17px; z-index:50;
}
.secret-btn.left  { left:28px; }
.secret-btn.right { right:28px; display:none; }
.secret-btn.right.show {
  display:block;
  animation: btnPop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes btnPop { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }

/* ===== SIDE PHOTO STACKS ===== */
/* Container pinned to left or right edge */
.side-stack {
  position: fixed;
  bottom: 90px;
  z-index: 40;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
  pointer-events: none;
  opacity: 0;
}
.side-stack.left-stack  { left: 0; align-items: flex-start; }
.side-stack.right-stack { right: 0; align-items: flex-end; }

/* Visible state */
.side-stack.visible {
  pointer-events: auto;
  opacity: 1;
}

/* Each photo in the stack */
.side-stack .sp {
  width: 230px; height: 230px;
  object-fit: cover;
  border-radius: 16px;
  border: 4px solid rgba(255,255,255,.9);
  box-shadow: 0 8px 28px rgba(0,0,0,.45);
  cursor: pointer;
  animation: wobble 3s ease-in-out infinite;
  transition: transform .3s, box-shadow .3s, opacity .3s;
  opacity: 0;
  transform: translateX(-120px);
}
.side-stack.right-stack .sp {
  transform: translateX(120px);
}

/* Staggered slide-in */
.side-stack.visible .sp {
  opacity: 1 !important;
  transform: translateX(0) !important;
}
.side-stack.visible .sp:nth-child(1) { transition: all .45s .05s cubic-bezier(.34,1.4,.64,1); }
.side-stack.visible .sp:nth-child(2) { transition: all .45s .18s cubic-bezier(.34,1.4,.64,1); }
.side-stack.visible .sp:nth-child(3) { transition: all .45s .31s cubic-bezier(.34,1.4,.64,1); }

/* Uneven offsets for staggered look */
.side-stack.left-stack .sp:nth-child(1) { margin-left: 112px; }
.side-stack.left-stack .sp:nth-child(2) { margin-left: 128px; }
.side-stack.left-stack .sp:nth-child(3) { margin-left: 106px;  }
.side-stack.right-stack .sp:nth-child(1) { margin-right: 110px; }
.side-stack.right-stack .sp:nth-child(2) { margin-right: 126px; }
.side-stack.right-stack .sp:nth-child(3) { margin-right: 108px;  }

/* Wobble */
@keyframes wobble {
  0%,100% { rotate:-2.5deg; translate:0 0; }
  25%     { rotate:0deg;    translate:0 -6px; }
  50%     { rotate:2.5deg;  translate:0 0; }
  75%     { rotate:0deg;    translate:0 -6px; }
}
.side-stack .sp:nth-child(1) { animation-delay:0s; }
.side-stack .sp:nth-child(2) { animation-delay:-1.1s; }
.side-stack .sp:nth-child(3) { animation-delay:-2.2s; }

/* Hover: stop wobble, float up */
.side-stack .sp:hover {
  animation: none !important;
  transform: scale(1.12) translateY(-12px) rotate(0deg) !important;
  box-shadow: 0 20px 45px rgba(194,24,91,.5) !important;
  z-index: 5;
}

/* Caption under bottom photo */
.side-caption {
  font-family: 'Dancing Script', cursive;
  font-size: 50px; font-weight: 700;
  color: white;
  text-shadow: 0 2px 10px rgba(0,0,0,.5);
  margin-top: 8px;
  padding: 0 10px;
  text-align: center;
  opacity: 0;
  transition: opacity .4s .5s;
}
.side-stack.visible .side-caption { opacity: 1; }
.side-stack.left-stack  .side-caption { margin-left: 356px; text-align:left; }
.side-stack.right-stack .side-caption { margin-right: 306px; text-align:right; }

/* ===== POPUP (main only) ===== */
.popup-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.6); z-index:100;
  justify-content:center; align-items:center;
  backdrop-filter:blur(10px);
}
.popup-overlay.show { display:flex; }
.popup-box {
  background: linear-gradient(145deg,#fff0f6,#ffd6e8);
  padding: 48px 56px 44px;
  border-radius: 36px;
  max-width: 520px; width: 92%;
  text-align: center;
  box-shadow: 0 40px 100px rgba(180,0,70,.45);
  animation: popIn .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.4);opacity:0;} to{transform:scale(1);opacity:1;} }
.popup-box h2 {
  font-family:'Dancing Script',cursive;
  font-size:42px; font-weight:700; color:#c2185b; margin-bottom:20px;
}
.popup-box p { font-size:18px; font-weight:600; line-height:1.9; color:#880e4f; }
.popup-close {
  margin-top:28px; padding:15px 44px;
  background:linear-gradient(135deg,#ff1744,#ff5c8a);
  color:white; border:none; border-radius:50px;
  font-family:'Nunito',sans-serif; font-size:18px; font-weight:800; cursor:pointer;
  box-shadow:0 0 20px rgba(255,23,68,.5);
  transition:transform .2s,box-shadow .2s;
}
.popup-close:hover { transform:scale(1.07); box-shadow:0 0 35px rgba(255,23,68,.8); }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="header">
  <h1>🌹 TADAAAAAAAAAAAA 🌹</h1>
  <div id="typing"></div>
</div>

<div class="heart-box" id="heartBox">
  <div id="photoContainer"></div>

  <!-- Center Slider -->
  <div class="center">
    <div class="slider-track" id="sliderTrack">
      <div class="slide"><img src="qnhu1.jpg" alt=""></div>
      <div class="slide"><img src="qnhu2.jpg" alt=""></div>
      <div class="slide"><img src="qnhu3.jpg" alt=""></div>
      <div class="slide"><img src="qnhu4.jpg" alt=""></div>
      <div class="slide"><img src="qnhu5.jpg" alt=""></div>
      <div class="slide"><img src="qnhu6.jpg" alt=""></div>
    </div>
    <div class="slide-dots" id="slideDots"></div>
  </div>
</div>

<!-- Main CTA button -->
<button class="cta-btn" onclick="document.getElementById('popupMain').classList.add('show')">
  Tớ có điều muốn nói ❤️
</button>

<!-- Secret button bottom-left -->
<button class="secret-btn left" id="btnLeft" onclick="toggleLeft()">
  Nhấp vào đây đi ạ 🌸
</button>

<!-- Secret button bottom-right (hidden until left clicked) -->
<button class="secret-btn right" id="btnRight" onclick="toggleRight()">
  Còn nữa nèeee 🌸
</button>

<!-- Left side photo stack -->
<div class="side-stack left-stack" id="stackLeft">
  <img class="sp" src="qnhu1.jpg" alt="">
  <img class="sp" src="qnhu2.jpg" alt="">
  <img class="sp" src="qnhu3.jpg" alt="">
  <div class="side-caption">ai mà đáng iu théee</div>
</div>

<!-- Right side photo stack -->
<div class="side-stack right-stack" id="stackRight">
  <img class="sp" src="qnhu4.jpg" alt="">
  <img class="sp" src="qnhu5.jpg" alt="">
  <img class="sp" src="qnhu6.jpg" alt="">
  <div class="side-caption">bít cutii òi, xem quàiiiii</div>
</div>

<!-- ===== POPUP MAIN ===== -->
<div class="popup-overlay" id="popupMain" onclick="this.classList.remove('show')">
  <div class="popup-box" onclick="event.stopPropagation()">
    <h2>💌 Gửi đến em iuu</h2>
    <p>
      Chúc Như một ngày 8/3 tràn ngập yêu thương 🌸<br><br>
      Em luôn là điều tuyệt vời nhất trong cuộc sống của anh.<br><br>
      Mãi yêu em! ❤️
    </p>
    <button class="popup-close" onclick="document.getElementById('popupMain').classList.remove('show')">
      💖 Dạaaaa!
    </button>
  </div>
</div>

<script>
/* ===== HEART BORDER PHOTOS ===== */
const CENTERS = [
  [310.0,133.3],[387.4,72.2],[454.0,58.3],
  [519.2,78.0], [568.6,125.0],[589.8,189.6],[576.8,256.5],
  [539.7,314.1],[491.7,363.2],[463.2,430.3],[388.1,453.8],
  [341.0,503.8],[310.0,564.3],[279.0,503.8],[231.9,453.8],
  [156.9,430.3],[128.4,363.3],[80.3,314.2], [43.2,256.5],
  [30.2,189.7], [51.4,125.1], [100.7,78.0], [165.9,58.3],
  [232.5,72.2]
];
const SRCS = ['qnhu1.jpg','qnhu2.jpg','qnhu3.jpg','qnhu4.jpg','qnhu5.jpg','qnhu6.jpg'];
const PHOTO = 65;
const box = document.getElementById('heartBox');
CENTERS.forEach(([cx,cy],i)=>{
  const img=document.createElement('img');
  img.src=SRCS[i%SRCS.length]; img.className='photo';
  img.style.left=(cx-PHOTO/2)+'px'; img.style.top=(cy-PHOTO/2)+'px';
  img.style.animationDelay=(-i*(4/CENTERS.length)).toFixed(2)+'s';
  box.insertBefore(img,box.querySelector('.center'));
});

/* ===== CENTER SLIDER ===== */
const slides = document.querySelectorAll('.slide');
const track  = document.getElementById('sliderTrack');
const dotsEl = document.getElementById('slideDots');
let cur = 0;
slides.forEach((_,idx)=>{
  const d=document.createElement('div');
  d.className='dot'+(idx===0?' active':'');
  d.addEventListener('click',()=>goTo(idx));
  dotsEl.appendChild(d);
});
function goTo(n){
  cur=n;
  track.style.transform=`translateX(-${n*230}px)`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===n));
}
setInterval(()=>goTo((cur+1)%slides.length),2800);

/* ===== TYPING ===== */
const text="Chúc Như một ngày 8/3 thật duii và lun tươi cười >.< ❤️";
let ti=0;
(function typing(){
  if(ti<text.length){ document.getElementById("typing").innerHTML=text.slice(0,++ti); setTimeout(typing,65); }
})();

/* ===== SECRET SIDE STACKS ===== */
let leftOpen=false, rightOpen=false, rightShown=false;

function toggleLeft(){
  leftOpen=!leftOpen;
  document.getElementById('stackLeft').classList.toggle('visible',leftOpen);
  // Reveal right button first time
  if(!rightShown){ rightShown=true; document.getElementById('btnRight').classList.add('show'); }
}
function toggleRight(){
  rightOpen=!rightOpen;
  document.getElementById('stackRight').classList.toggle('visible',rightOpen);
}

/* ===== FLOATING HEARTS ===== */
const bg=document.getElementById('heartsBg');
const emojis=['❤️','🩷','💗','💖','💓','💕','💞','💝'];
function spawn(){
  const el=document.createElement('div'); el.className='hf';
  const sz=14+Math.random()*28, lft=(Math.random()*110)-5;
  const dur=8+Math.random()*12, del=Math.random()*6;
  const dx=((Math.random()-.5)*180)+'px', rot=((Math.random()-.5)*60)+'deg', sc=.5+Math.random()*.85;
  el.style.cssText=`left:${lft}%;--sz:${sz}px;--dur:${dur}s;--del:-${del}s;--dx:${dx};--rot:${rot};--sc:${sc};`;
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  bg.appendChild(el); setTimeout(()=>el.remove(),(dur+2)*1000);
}
for(let k=0;k<30;k++) setTimeout(spawn,k*60);
setInterval(spawn,260);
</script>
</body>
</html>
